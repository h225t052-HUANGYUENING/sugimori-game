<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Moorii Search</title>
  <style>
    :root{
      --text:#202124;
      --muted:#5f6368;
      --line:#dadce0;
      --blue:#1a73e8;
      --bg:#ffffff;
      --soft:#f8fafd;
      --shadow:0 1px 6px rgba(32,33,36,.14);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Yu Gothic UI",Meiryo,sans-serif;
      line-height:1.6;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    a:hover{
      text-decoration:underline;
    }

    .topbar{
      height:54px;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:18px;
      padding:0 24px;
      font-size:13px;
      color:#3c4043;
    }

    .topbar a{
      color:#3c4043;
    }

    .app-dot{
      width:32px;
      height:32px;
      border-radius:50%;
      display:grid;
      place-items:center;
      color:#5f6368;
      font-size:18px;
    }

    .app-dot:hover{
      background:#f1f3f4;
      text-decoration:none;
    }

    .profile-dot{
      width:32px;
      height:32px;
      border-radius:50%;
      background:linear-gradient(135deg,#6a8caf,#b8c6db);
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:700;
      font-size:13px;
    }

    .main{
      min-height:calc(100vh - 54px);
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:86px 18px 36px;
    }

    .logo{
      font-size:76px;
      line-height:1;
      font-weight:500;
      letter-spacing:-.06em;
      margin-bottom:28px;
      user-select:none;
    }

    .logo span:nth-child(1){color:#2f5d50;}
    .logo span:nth-child(2){color:#4f7c68;}
    .logo span:nth-child(3){color:#8a7a45;}
    .logo span:nth-child(4){color:#355070;}
    .logo span:nth-child(5){color:#6b705c;}
    .logo span:nth-child(6){color:#9a6a4f;}

    .search-wrap{
      width:min(584px,100%);
      position:relative;
    }

    .searchbox{
      height:46px;
      border:1px solid var(--line);
      border-radius:999px;
      display:flex;
      align-items:center;
      padding:0 14px;
      background:#fff;
      transition:box-shadow .16s,border-color .16s;
    }

    .searchbox:hover,
    .searchbox:focus-within{
      box-shadow:var(--shadow);
      border-color:transparent;
    }

    .search-icon{
      color:#9aa0a6;
      font-size:18px;
      margin-right:10px;
      transform:translateY(-1px);
    }

    .searchbox input{
      flex:1;
      border:0;
      outline:0;
      font-size:16px;
      background:transparent;
      color:var(--text);
      padding:0 4px;
    }

    .searchbox button{
      border:0;
      background:transparent;
      color:#5f6368;
      cursor:pointer;
      font-size:13px;
      padding:6px 10px;
      border-radius:8px;
    }

    .searchbox button:hover{
      background:#f1f3f4;
    }

    .buttons{
      margin-top:28px;
      display:flex;
      justify-content:center;
      gap:12px;
    }

    .buttons button{
      border:1px solid #f8f9fa;
      background:#f8f9fa;
      color:#3c4043;
      border-radius:4px;
      padding:9px 16px;
      font-size:14px;
      cursor:pointer;
    }

    .buttons button:hover{
      border-color:#dadce0;
      box-shadow:0 1px 1px rgba(0,0,0,.08);
    }

    #results{
      display:none;
      width:min(720px,100%);
      margin-top:34px;
      align-self:center;
    }

    .result-head{
      color:#70757a;
      font-size:13px;
      border-bottom:1px solid #ebedef;
      padding-bottom:10px;
      margin-bottom:18px;
    }

    .result{
      margin:0 0 22px;
    }

    .result .url{
      color:#202124;
      font-size:12px;
      margin-bottom:2px;
    }

    .result a{
      color:#1a0dab;
      font-size:20px;
      line-height:1.3;
      font-weight:400;
    }

    .result .desc{
      color:#4d5156;
      font-size:14px;
      margin-top:4px;
    }

    .no-result{
      color:#4d5156;
      font-size:14px;
      padding:8px 0;
    }

    .homeblocks{
      width:min(680px,100%);
      margin-top:42px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .home-section{
      min-width:0;
    }

    .section-title{
      font-size:12px;
      color:#70757a;
      margin:0 0 8px 4px;
    }

    .suggest-card{
      display:block;
      border:1px solid #e0e3e7;
      border-radius:12px;
      background:#fff;
      padding:14px 16px;
      min-height:104px;
      transition:box-shadow .15s,border-color .15s,transform .15s;
    }

    .suggest-card:hover{
      text-decoration:none;
      box-shadow:0 3px 12px rgba(60,64,67,.16);
      border-color:#d5d9de;
      transform:translateY(-1px);
    }

    .suggest-card .label{
      font-size:11px;
      color:#70757a;
      margin-bottom:5px;
    }

    .suggest-card h3{
      margin:0 0 6px;
      color:#202124;
      font-size:15px;
      line-height:1.45;
      font-weight:500;
    }

    .suggest-card p{
      margin:0;
      color:#5f6368;
      font-size:12px;
      line-height:1.55;
    }

    .suggest-card.local h3{
      color:#1a0dab;
    }

    .suggest-card.history{
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .history-title{
      display:flex;
      align-items:center;
      gap:8px;
      color:#202124;
      font-size:15px;
      font-weight:500;
    }

    .history-title::before{
      content:"🕘";
      font-size:15px;
      opacity:.75;
    }

    .footer{
      margin-top:auto;
      padding-top:56px;
      color:#70757a;
      font-size:12px;
      text-align:center;
    }

    @media(max-width:720px){
      .main{
        padding-top:70px;
      }

      .logo{
        font-size:58px;
        margin-bottom:24px;
      }

      .homeblocks{
        grid-template-columns:1fr;
        margin-top:34px;
      }

      .buttons{
        margin-top:22px;
      }

      .buttons button{
        font-size:13px;
        padding:8px 12px;
      }

      .topbar{
        padding:0 14px;
        gap:12px;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <a href="#">地域情報</a>
    <a href="#">アーカイブ</a>
    <a class="app-dot" href="#" aria-label="apps">⋮⋮</a>
    <div class="profile-dot">M</div>
  </header>

  <main class="main">
    <div class="logo" aria-label="Moorii">
      <span>M</span><span>o</span><span>o</span><span>r</span><span>i</span><span>i</span>
    </div>

    <div class="search-wrap">
      <div class="searchbox">
        <span class="search-icon">⌕</span>
        <input id="q" placeholder="検索ワードを入力..." autocomplete="off" onkeydown="if(event.key==='Enter')search()">
        <button onclick="search()">検索</button>
      </div>
    </div>

    <div class="buttons">
      <button onclick="search()">Moorii 検索</button>
      <button onclick="document.getElementById('q').value='杉守村';search()">地域のおすすめ</button>
    </div>

    <section id="results"></section>

    <section class="homeblocks" id="homeblocks">
      <div class="home-section">
        <div class="section-title">地域の話題</div>
        <a class="suggest-card local" href="forum.html">
          <div class="label">ura-navi.example/thread/1049382</div>
          <h3>【画像】この山、全部墓みたいなんだが…</h3>
          <p>京都山中で撮影された白い林について語る匿名掲示板の投稿。</p>
        </a>
      </div>

      <div class="home-section">
        <div class="section-title">最近開いたページ</div>
        <a class="suggest-card history" href="chat.html">
          <div class="label">local/chat/haruka</div>
          <div class="history-title">杉谷遥とのチャットログ</div>
          <p style="margin-top:8px;">保存された個人チャットの記録。</p>
        </a>
      </div>
    </section>

    <div class="footer">このゲームは完全なフィクションです。実在の人物・団体・地名・事件などとは一切関係ありません。</div>
  </main>

  <script>
    const data=[
      {
        keys:["杉守村","杉守"],
        title:"【攻略】小さな観光地・杉守村",
        desc:"杉守山の麓にある小さな村。近年は杉鳴神社を中心に観光客も増えている。",
        url:"travel.local/sugimori-village",
        link:"village.html"
      },
      {
        
        keys:["杉鳴様","杉鳴神社"],
        title:"杉鳴神社 公式案内",
        desc:"杉守山に鎮座する小さな神社。杉鳴神を祀るとされる。",
        url:"suginari-shrine.example",
        link:"shrine.html"

      },
      {
        keys:["巡山祭"],
        title:"巡山祭について",
        desc:"杉守村で毎年行われる祭礼。一般公開されるのは奉納舞と酒造りまで。",
        url:"suginari-shrine.example/festival",
        link:"festival.html"
      },
      {
        keys:["私立北杉高校","北杉高校"],
        title:"私立北杉高校",
        desc:"杉守村にある小規模な私立高校。村と密接な関係を持つ。",
        url:"kitasugi-high.example",
        link:"school.html"
      },
      {
        keys:["榊病院"],
        title:"榊病院 公式サイト",
        desc:"杉守村周辺の地域医療を担う病院。",
        url:"sakaki-hospital.example",
        link:"hospital.html"
      },
      {
        keys:["榊隆文","榊"],
        title:"榊隆文 医師紹介",
        desc:"榊病院の現院長。地域医療支援に尽力している。",
        url:"sakaki-hospital.example/director",
        link:"sakaki.html"
      },
      {
        keys:["榊隆文","榊"],
        title:"「名門出身の医師、山間地域を支える」",
        desc:"地域医療に携わる榊隆文医師へのインタビュー記事。",
        url:"local-interview.example/sakaki",
        link:"sakaki_interview.html"
      },
      {
        keys:["杉守村土地購入及び使用記録","土地購入","使用記録"],
        title:"杉守村土地購入及び使用記録",
        desc:"過去の土地利用申請と建築記録。",
        url:"sugimori-village.example/records/land",
        link:"land.html"
      }
    ];

    function search(){
      const q=document.getElementById('q').value.trim();
      const box=document.getElementById('results');
      const home=document.getElementById('homeblocks');

      if(!q){
        box.style.display='none';
        home.style.display='grid';
        return;
      }

      const res=data
        .filter(r=>r.keys.some(k=>q.includes(k)||k.includes(q)))
        .slice(0,3);

      box.style.display='block';
      home.style.display='none';

      if(!res.length){
        box.innerHTML=`
          <div class="result-head">検索結果</div>
          <div class="no-result">該当する検索結果はありません。</div>
        `;
        return;
      }

      box.innerHTML=`
        <div class="result-head">約 ${res.length} 件の検索結果</div>
        ${res.map(r=>`
          <div class="result">
            <div class="url">${r.url}</div>
            <a href="${r.link}">${r.title}</a>
            <div class="desc">${r.desc}</div>
          </div>
        `).join('')}
      `;
    }
  </script>
</body>
</html>
