<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>友だち追加</title>

<style>
:root{
  --green:#06c755;
  --dark:#27323d;
  --text:#1f2328;
  --muted:#7b8794;
  --line:#e1e5ea;
  --bg:#f4f6f8;
  --card:#ffffff;
  --danger:#a14a4a;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  background:#f2f4f7;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Yu Gothic UI",Meiryo,sans-serif;
}

a{
  color:inherit;
  text-decoration:none;
}

.phone{
  width:min(430px,100%);
  min-height:100vh;
  margin:0 auto;
  background:var(--bg);
  box-shadow:0 0 28px rgba(0,0,0,.14);
  display:flex;
  flex-direction:column;
}

.header{
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:14px 16px 12px;
  position:sticky;
  top:0;
  z-index:10;
}

.topline{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.back{
  font-size:13px;
  color:#5f6b78;
}

.back:hover{
  text-decoration:underline;
}

.appname{
  font-size:12px;
  color:#9aa3ad;
}

.title{
  font-size:25px;
  font-weight:800;
  letter-spacing:.02em;
  margin-top:10px;
}

.subtitle{
  margin-top:4px;
  color:#7b8794;
  font-size:12px;
}

.content{
  padding:16px;
  flex:1;
}

.search-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  box-shadow:0 4px 14px rgba(30,42,56,.05);
}

.label{
  font-size:12px;
  color:#7b8794;
  margin-bottom:8px;
}

.searchline{
  display:flex;
  align-items:center;
  gap:8px;
  background:#f0f2f4;
  border-radius:999px;
  padding:6px 8px 6px 14px;
}

.searchline input{
  flex:1;
  border:0;
  outline:0;
  background:transparent;
  font-size:15px;
  min-width:0;
  color:var(--text);
}

.searchline button{
  border:0;
  background:var(--green);
  color:#fff;
  border-radius:999px;
  padding:8px 14px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
}

.searchline button:hover{
  filter:brightness(.96);
}

.hint{
  margin-top:10px;
  color:#9aa3ad;
  font-size:11px;
  line-height:1.6;
}

.result-area{
  margin-top:14px;
}

.user-card{
  display:flex;
  align-items:center;
  gap:12px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:13px;
  box-shadow:0 4px 14px rgba(30,42,56,.05);
}

.user-card:hover{
  text-decoration:none;
  background:#fbfcfd;
}

.avatar{
  width:46px;
  height:46px;
  border-radius:50%;
  background:linear-gradient(135deg,#e5e7eb,#f8fafc);
  display:grid;
  place-items:center;
  font-size:22px;
  flex-shrink:0;
  overflow:hidden;
}
  .avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
}
.user-main{
  flex:1;
  min-width:0;
}

.user-name{
  font-size:15px;
  font-weight:700;
}

.user-desc{
  color:#7b8794;
  font-size:12px;
  margin-top:2px;
}

.arrow{
  color:#a0a8b2;
  font-size:18px;
}

.notfound{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  color:#7b8794;
  font-size:13px;
  line-height:1.7;
}

.recent{
  margin-top:18px;
}

.section-title{
  font-size:12px;
  color:#8793a0;
  margin:0 0 8px 4px;
}

.disabled-list{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
}

.disabled-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-bottom:1px solid #eef1f4;
  color:#7b8794;
  font-size:13px;
}

.disabled-item:last-child{
  border-bottom:0;
}

.disabled-avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#edf0f3;
  display:grid;
  place-items:center;
  flex-shrink:0;
}

.footer{
  padding:18px 16px 22px;
  text-align:center;
  font-size:11px;
  line-height:1.7;
  color:#8a96a3;
}

@media(max-width:480px){
  .phone{
    box-shadow:none;
  }
}
</style>
</head>

<body>
<div class="phone">

  <header class="header">
    <div class="topline">
      <a class="back" href="chat_home.html">← トークに戻る</a>
      <div class="appname">Talk</div>
    </div>

    <div class="title">友だち追加</div>
    <div class="subtitle">名前を入力して、端末内のユーザー情報を検索します。</div>
  </header>

  <main class="content">
    <section class="search-card">
      <div class="label">ユーザー検索</div>

      <div class="searchline">
        <input id="name" placeholder="名前を入力" onkeydown="if(event.key==='Enter')add()">
        <button onclick="add()">検索</button>
      </div>

      <div class="hint">
        入力された名前に一致するユーザーがいる場合、申請ページを表示します。
      </div>
    </section>

    <div id="res" class="result-area"></div>

    <section class="recent">
      <div class="section-title">最近追加した連絡先</div>

      <div class="disabled-list">
        <div class="disabled-item">
          <div class="disabled-avatar">☕</div>
          <div>駅前カフェ シフト連絡</div>
        </div>
        <div class="disabled-item">
          <div class="avatar">
            <img src="maki_eagle.png" alt="高城真紀">
          </div>
          <div>卒制メモ共有</div>
        </div>
      </div>
    </section>
  </main>

  <div class="footer">
    このゲームは完全なフィクションです。実在の人物・団体・地名・事件などとは一切関係ありません。
  </div>

</div>

<script>
function add(){
  const v = document.getElementById('name').value.trim();
  const normalized = v.replace(/\s+/g, '');
  const res = document.getElementById('res');

  if(normalized === '高城真紀'){
    res.innerHTML = `
      <a class="user-card" href="takashiro_add.html">
        <div class="avatar">🪪</div>
        <div class="user-main">
          <div class="user-name">高城 真紀</div>
          <div class="user-desc">申請ページを開く</div>
        </div>
        <div class="arrow">›</div>
      </a>
    `;
  }else{
    res.innerHTML = `
      <div class="notfound">
        該当するユーザーは見つかりません。<br>
        名前の表記を確認して、もう一度検索してください。
      </div>
    `;
  }
}
</script>

</body>
</html>
