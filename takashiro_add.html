<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>友だち申請 — 高城真紀</title>

<style>
:root{
  --green:#06c755;
  --text:#1f2328;
  --muted:#7b8794;
  --line:#e1e5ea;
  --bg:#f4f6f8;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  background:#f2f4f7;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Yu Gothic UI",Meiryo,sans-serif;
}

a{
  color:inherit;
  text-decoration:none;
}

.phone{
  width:min(430px,100%);
  min-height:100vh;
  margin:0 auto;
  background:var(--bg);
  box-shadow:0 0 28px rgba(0,0,0,.14);
  display:flex;
  flex-direction:column;
}

.header{
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:14px 16px 12px;
  position:sticky;
  top:0;
  z-index:10;
}

.topline{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.back{
  font-size:13px;
  color:#5f6b78;
}

.back:hover{
  text-decoration:underline;
}

.appname{
  font-size:12px;
  color:#9aa3ad;
}

.title{
  font-size:25px;
  font-weight:800;
  margin-top:10px;
}

.subtitle{
  margin-top:4px;
  color:#7b8794;
  font-size:12px;
}

.content{
  flex:1;
  padding:18px 16px;
}

.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:20px;
  padding:22px 18px;
  box-shadow:0 4px 14px rgba(30,42,56,.05);
}

.user{
  text-align:center;
  padding-bottom:18px;
  border-bottom:1px solid #eef1f4;
}

.avatar{
  width:78px;
  height:78px;
  margin:0 auto 12px;
  border-radius:50%;
  background:linear-gradient(135deg,#dce7f3,#f6f2ea);
  display:grid;
  place-items:center;
  font-size:38px;
  cursor:pointer;
  box-shadow:0 0 0 5px #f4f6f8;
}

.name{
  font-size:21px;
  font-weight:800;
}

.id{
  color:#7b8794;
  font-size:12px;
  margin-top:2px;
}

.hint{
  color:#9aa3ad;
  font-size:11px;
  margin-top:8px;
}

.form{
  padding-top:18px;
}

.label{
  font-size:12px;
  color:#7b8794;
  margin-bottom:7px;
}

.message{
  width:100%;
  min-height:92px;
  resize:none;
  border:1px solid #dde2e8;
  border-radius:14px;
  padding:11px 12px;
  font-size:14px;
  line-height:1.7;
  color:#1f2328;
  background:#fbfcfd;
  font-family:inherit;
}

.buttons{
  margin-top:14px;
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  border:0;
  border-radius:12px;
  padding:12px 14px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}

.primary{
  background:var(--green);
  color:#fff;
}

.secondary{
  background:#e9edf1;
  color:#5f6b78;
}

.primary:hover{
  filter:brightness(.96);
}

.secondary:hover{
  background:#dfe4e9;
}

.footer{
  padding:18px 16px 22px;
  text-align:center;
  font-size:11px;
  line-height:1.7;
  color:#8a96a3;
}

@media(max-width:480px){
  .phone{
    box-shadow:none;
  }
}
</style>
</head>

<body>
<div class="phone">

  <header class="header">
    <div class="topline">
      <a class="back" href="add_friend.html">← 友だち追加に戻る</a>
      <div class="appname">Talk</div>
    </div>

    <div class="title">友だち申請</div>
    <div class="subtitle">申請メッセージを確認してください。</div>
  </header>

  <main class="content">
    <section class="card">

      <div class="user">
        <div class="avatar" onclick="location.href='takashiro_profile.html'">
          <img src="maki_eagle.png" alt="高城真紀">
        </div>
        <div class="name">高城 真紀</div>
        <div class="id">ユーザーID：maki</div>
        <div class="hint">※ アイコンをクリックするとプロフィールを表示できます。</div>
      </div>

      <div class="form">
        <div class="label">申請メッセージ</div>
        <textarea class="message">娘さんの失踪についてお伝えしたいことがあります。現在、私も調べています。</textarea>

        <div class="buttons">
          <button class="btn secondary" onclick="location.href='add_friend.html'">戻る</button>
          <button class="btn primary" onclick="alert('友だち申請を送信しました。')">申請を送信</button>
        </div>
      </div>

    </section>
  </main>

  <div class="footer">
    このゲームは完全なフィクションです。実在の人物・団体・地名・事件などとは一切関係ありません。
  </div>

</div>
</body>
</html>
